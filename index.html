<style>
/* =========================================================================
   SELF-HOSTED FONTS — all woff2, subset to Latin, served from /fonts.
   No external font CDN: fewer connections, faster text paint, full privacy.
   ========================================================================= */
@font-face {
  font-family: 'Anton';
  src: url('fonts/anton-400.woff2') format('woff2');
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Rubik';
  src: url('fonts/rubik-variable.woff2') format('woff2');
  font-weight: 300 900; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Saira Stencil One';
  src: url('fonts/saira-stencil-400.woff2') format('woff2');
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Haboro Soft Condensed';
  src: url('fonts/haboro-condensed-extrabold.woff2') format('woff2');
  font-weight: 800; font-style: normal; font-display: swap;
}

/* =========================================================================
   DESIGN TOKENS
   All colors, spacings, fonts, transitions live here.
   No hard-coded values anywhere else.
   ========================================================================= */
:root {
  /* Brand colors — extracted pixel-by-pixel from the Zona G visual identity */
  --c-black: #231F20;
  --c-white: #FFFFFF;
  --c-gray:  #D8D8D8;
  --c-neon:  #EAEA70;
  --c-coral: #F58D8A;
  --c-purple:       #7E77BA;  /* brand purple (exact logo color) */
  --c-purple-light: #9A92D0;  /* light lavender — used for text accents/lines */
  --c-purple-deep:      #1A1730;  /* very dark purple — alternating section bg */
  --c-purple-deep-soft: #241F3D;  /* cards sitting on the dark-purple bg */

  /* HYROX brand */
  --c-hyrox-yellow: #FEED00;
  --c-hyrox-bg: #000000;

  /* General accent = PURPLE (CrossFit, Yoga, Fuerza, global UI).
     HYROX is the only exception and uses yellow (handled in the disciplinas scope). */
  --c-accent: var(--c-purple-light);
  --c-accent-soft: rgba(154, 146, 208, 0.14);
  --c-accent-line: rgba(154, 146, 208, 0.4);

  /* Discipline-scoped accent: purple by default, flips to yellow for HYROX */
  --c-disc-accent: var(--c-purple-light);

  /* Functional colors */
  --c-bg: var(--c-black);
  --c-surface: #1A1718;
  --c-surface-2: #110F10;
  --c-fg: var(--c-white);
  --c-muted: rgba(255, 255, 255, 0.55);
  --c-muted-2: rgba(255, 255, 255, 0.78);
  --c-line: rgba(255, 255, 255, 0.08);
  --c-line-strong: rgba(255, 255, 255, 0.18);

  /* Action color (WhatsApp green is universal, not a brand color) */
  --c-wa: #25D366;

  /* Typography */
  --f-display: 'Anton', 'Arial Narrow', sans-serif;
  --f-stencil: 'Saira Stencil One', 'Anton', sans-serif;
  --f-hyrox: 'Haboro Soft Condensed', 'Arial Narrow', sans-serif;
  --f-body: 'Rubik', -apple-system, system-ui, sans-serif;

  /* Type scale (clamps for fluid sizing) */
  --t-mega: clamp(4rem, 13vw, 11rem);
  --t-h1:   clamp(2.75rem, 8vw, 6.5rem);
  --t-h2:   clamp(2.25rem, 5.5vw, 4.25rem);
  --t-h3:   clamp(1.4rem, 2.5vw, 2rem);
  --t-body: clamp(1rem, 1.1vw, 1.125rem);
  --t-lead: clamp(1.125rem, 1.5vw, 1.375rem);
  --t-small: 0.875rem;
  --t-micro: 0.75rem;
  --t-mark:  0.78rem;

  /* Spacing scale */
  --s-1: 0.5rem;
  --s-2: 1rem;
  --s-3: 1.5rem;
  --s-4: 2rem;
  --s-5: 3rem;
  --s-6: 4rem;
  --s-7: 6rem;
  --s-8: 8rem;
  --s-9: 12rem;

  /* Layout */
  --container: 1320px;
  --container-px: clamp(1.25rem, 4vw, 3rem);
  --nav-h: 76px;

  /* Border radius scale */
  --radius-sm:   6px;
  --radius:     10px;
  --radius-lg:  16px;
  --radius-pill: 999px;

  /* Motion */
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --t-fast: 0.2s;
  --t-mid: 0.4s;
  --t-slow: 0.8s;
}



/* =========================================================================
   RESET + BASE
   ========================================================================= */
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: var(--f-body);
  font-size: var(--t-body);
  line-height: 1.6;
  color: var(--c-fg);
  background: var(--c-bg);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
img, svg { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
ul { list-style: none; padding: 0; margin: 0; }
::selection { background: var(--c-accent); color: var(--c-black); }

/* =========================================================================
   LAYOUT PRIMITIVES
   ========================================================================= */
.container {
  max-width: var(--container);
  margin: 0 auto;
  padding-inline: var(--container-px);
}

.container--wide {
  max-width: 1600px;
}

section {
  padding-block: var(--s-8);
  position: relative;
}

@media (max-width: 768px) {
  section { padding-block: var(--s-6); }
}

/* =========================================================================
   TYPOGRAPHY UTILITIES
   ========================================================================= */
/* Section "mark": replaces the eyebrow pattern.
   A small stenciled marker at the top of each section. Distinct from Caoba. */
.section-mark {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  font-family: var(--f-stencil);
  font-size: var(--t-mark);
  letter-spacing: 0.18em;
  color: var(--c-accent);
  text-transform: uppercase;
  margin: 0 0 var(--s-3);
}
.section-mark::before {
  content: "";
  width: 28px;
  height: 1px;
  background: var(--c-accent);
  display: inline-block;
}

.section-title {
  font-family: var(--f-display);
  font-size: var(--t-h2);
  font-style: italic;
  line-height: 0.92;
  letter-spacing: -0.012em;
  text-transform: uppercase;
  margin: 0;
}

.section-lead {
  font-family: var(--f-body);
  font-size: var(--t-lead);
  font-weight: 300;
  line-height: 1.45;
  color: var(--c-muted-2);
  max-width: 56ch;
  margin: var(--s-3) 0 0;
}

.muted { color: var(--c-muted); }
.fine { font-size: var(--t-small); color: var(--c-muted); }

/* Section header layout: mark on top, title below, optional lead on the right */
.section-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--s-5);
  align-items: end;
  margin-bottom: var(--s-6);
}
@media (max-width: 768px) {
  .section-header { grid-template-columns: 1fr; gap: var(--s-3); margin-bottom: var(--s-5); }
}

/* =========================================================================
   BUTTONS
   ========================================================================= */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--s-1);
  padding: 1rem 1.75rem;
  font-family: var(--f-body);
  font-weight: 600;
  font-size: 0.95rem;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  border: 1.5px solid var(--c-fg);
  border-radius: var(--radius);
  background: transparent;
  color: var(--c-fg);
  transition: all var(--t-mid) var(--ease);
  cursor: pointer;
  white-space: nowrap;
}
.btn:hover { background: var(--c-fg); color: var(--c-black); }

.btn--accent {
  background: var(--c-accent);
  color: var(--c-black);
  border-color: var(--c-accent);
}
.btn--accent:hover {
  background: transparent;
  color: var(--c-accent);
}

.btn--ghost {
  border-color: var(--c-line-strong);
  color: var(--c-fg);
}
.btn--ghost:hover {
  border-color: var(--c-fg);
  background: var(--c-fg);
  color: var(--c-black);
}

/* HYROX CTA — official yellow, black text. The discipline's signature color. */
.btn--hyrox {
  background: var(--c-hyrox-yellow);
  color: var(--c-black);
  border-color: var(--c-hyrox-yellow);
}
.btn--hyrox:hover {
  background: transparent;
  color: var(--c-hyrox-yellow);
}

.btn--small {
  padding: 0.65rem 1.1rem;
  font-size: 0.8rem;
  border-radius: var(--radius-sm);
}

.btn--wa {
  background: var(--c-white);
  border-color: var(--c-wa);
  color: var(--c-wa);
}
.btn--wa:hover { background: var(--c-wa); color: var(--c-white); border-color: var(--c-wa); }
.btn--wa:hover .wa-icon { color: var(--c-white); }

/* WhatsApp icon: always green by default. Inside a btn--wa it flips to white on hover. */
.wa-icon { color: var(--c-wa); width: 1em; height: 1em; flex-shrink: 0; }
.btn--accent .wa-icon { color: var(--c-wa); }
.btn--ghost .wa-icon  { color: var(--c-wa); }

.text-link {
  display: inline-flex;
  align-items: center;
  gap: 0.4em;
  color: var(--c-accent);
  font-weight: 500;
  border-bottom: 1px solid var(--c-accent-line);
  padding-bottom: 2px;
  transition: gap var(--t-fast) var(--ease);
}
.text-link:hover { gap: 0.8em; }

/* =========================================================================
   REVEAL ANIMATION
   ========================================================================= */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s var(--ease-out), transform 0.7s var(--ease-out);
}
.reveal.is-visible {
  opacity: 1;
  transform: translateY(0);
}

@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1; transform: none; transition: none; }
  html { scroll-behavior: auto; }
}

/* =========================================================================
   NAV
   ========================================================================= */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(35, 31, 32, 0.86);
  backdrop-filter: saturate(160%) blur(14px);
  -webkit-backdrop-filter: saturate(160%) blur(14px);
  border-bottom: 1px solid var(--c-line);
  height: var(--nav-h);
}

.nav__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100%;
  gap: var(--s-3);
}

.nav__brand {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  min-width: 0;
}

.nav__logo {
  display: block;
  line-height: 0;
}
.nav__logo-img {
  height: 42px;
  width: auto;
  display: block;
}

/* Vertical separators between ZONA G | HYROX | EST. 2012 */
.nav__brand-sep {
  width: 1px;
  height: 26px;
  background: var(--c-line-strong);
  flex-shrink: 0;
}

.nav__brand-hyrox {
  font-family: var(--f-hyrox);
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--c-fg);
  /* compensate trailing letter-spacing so the separator sits evenly */
  padding-left: 0.22em;
  white-space: nowrap;
}

.nav__brand-est {
  font-family: var(--f-stencil);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--c-muted);
  white-space: nowrap;
}

.nav__center {
  display: flex;
  align-items: center;
  gap: var(--s-4);
  flex: 1;
  justify-content: center;
}

.nav__links {
  display: flex;
  gap: var(--s-4);
  align-items: center;
}

.nav__links a {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--c-muted-2);
  transition: color var(--t-fast);
  letter-spacing: 0.02em;
  position: relative;
}
.nav__links a:hover { color: var(--c-fg); }
.nav__links a::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -6px;
  height: 1px;
  background: var(--c-accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform var(--t-mid) var(--ease);
}
.nav__links a:hover::after { transform: scaleX(1); }

.nav__right {
  display: flex;
  align-items: center;
  gap: var(--s-2);
}

.nav__burger {
  display: none;
  width: 36px;
  height: 36px;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 5px;
}
.nav__burger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--c-fg);
  transition: transform var(--t-fast), opacity var(--t-fast);
}
body.menu-open .nav__burger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
body.menu-open .nav__burger span:nth-child(2) { opacity: 0; }
body.menu-open .nav__burger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

@media (max-width: 1024px) {
  .nav__center {
    position: fixed;
    inset: var(--nav-h) 0 0 0;
    background: var(--c-bg);
    flex-direction: column;
    justify-content: flex-start;
    padding: var(--s-5) var(--container-px);
    gap: var(--s-5);
    transform: translateX(100%);
    transition: transform var(--t-mid) var(--ease);
  }
  .nav__center.is-mobile-open { transform: translateX(0); }
  .nav__links { flex-direction: column; gap: var(--s-3); align-items: flex-start; }
  .nav__links a { font-size: 1.5rem; font-family: var(--f-display); font-style: italic; text-transform: uppercase; }
  .nav__burger { display: flex; }
  .nav__cta-text { display: none; }
}

/* Brand lockup responsive: drop EST. 2012 first, then HYROX, as width shrinks */
@media (max-width: 560px) {
  .nav__brand-est,
  .nav__brand-sep--est { display: none; }
  .nav__brand-hyrox { font-size: 0.95rem; letter-spacing: 0.16em; }
}
@media (max-width: 400px) {
  .nav__brand-hyrox,
  .nav__brand-sep { display: none; }
}

/* =========================================================================
   HERO — asymmetric editorial layout, distinct from Caoba's centered hero
   ========================================================================= */
.hero {
  padding-block: var(--s-7) 0;
  border-bottom: 1px solid var(--c-line);
}

.hero__top {
  display: block;
  padding-bottom: var(--s-7);
}

.hero__meta {
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
  font-family: var(--f-stencil);
  font-size: var(--t-mark);
  letter-spacing: 0.18em;
  color: var(--c-accent);
  text-transform: uppercase;
}
.hero__meta span:nth-child(2) { color: var(--c-muted); }

.hero__title {
  font-family: var(--f-display);
  font-style: italic;
  font-size: var(--t-mega);
  line-height: 0.84;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  margin: var(--s-3) 0 0;
}
.hero__title em {
  font-style: italic;
  color: var(--c-accent);
}
/* HYROX rendered in its official typeface (Haboro Soft Condensed), upright. */
.hero__title .hero-hyrox {
  font-family: var(--f-hyrox);
  font-weight: 800;
  font-style: normal;
  letter-spacing: 0;
  font-size: 1em;
  display: inline-block;
  color: var(--c-hyrox-yellow);
}

.hero__subtitle {
  font-size: var(--t-lead);
  font-weight: 300;
  line-height: 1.45;
  color: var(--c-muted-2);
  max-width: 60ch;
  margin: var(--s-4) 0 var(--s-4);
}
.hero__subtitle strong {
  color: var(--c-fg);
  font-weight: 500;
}

.hero__ctas {
  display: flex;
  gap: var(--s-2);
  flex-wrap: wrap;
}

@media (max-width: 1024px) {
  .hero__top {
    padding-bottom: var(--s-5);
  }
}

/* =========================================================================
   MANIFIESTO — replaces the 6-card numbered grid (very Caoba)
   Editorial: big quote + horizontal pillar list, no card frames
   ========================================================================= */
.manifiesto {
  background: var(--c-purple-deep);
}

.manifiesto__quote {
  font-family: var(--f-display);
  font-style: italic;
  font-size: var(--t-h1);
  line-height: 0.95;
  letter-spacing: -0.012em;
  text-transform: uppercase;
  max-width: 22ch;
  margin: 0 0 var(--s-7);
}
.manifiesto__quote em {
  color: var(--c-accent);
  font-style: italic;
}
.manifiesto__quote .small {
  display: block;
  font-family: var(--f-body);
  font-style: normal;
  font-size: var(--t-lead);
  font-weight: 300;
  text-transform: none;
  letter-spacing: 0;
  color: var(--c-muted-2);
  margin-top: var(--s-3);
  line-height: 1.5;
  max-width: 50ch;
}

.pillars {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--s-5);
  border-top: 1px solid var(--c-line);
  padding-top: var(--s-5);
}
.pillar {
  display: flex;
  flex-direction: column;
  gap: var(--s-1);
}
.pillar__mark {
  font-family: var(--f-stencil);
  font-size: var(--t-mark);
  letter-spacing: 0.18em;
  color: var(--c-accent);
  text-transform: uppercase;
  margin-bottom: var(--s-1);
}
.pillar__title {
  font-family: var(--f-display);
  font-style: italic;
  font-size: 1.6rem;
  line-height: 1;
  text-transform: uppercase;
  letter-spacing: -0.005em;
  margin: 0 0 var(--s-1);
}
.pillar__text {
  color: var(--c-muted-2);
  font-size: 0.98rem;
  line-height: 1.55;
  margin: 0;
}

@media (max-width: 1024px) {
  .pillars { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .pillars { grid-template-columns: 1fr; gap: var(--s-4); }
}

/* =========================================================================
   DISCIPLINAS — two big lines side by side + shared core (Yoga/Fuerza)
   ========================================================================= */
.disciplinas {
  background: var(--c-bg);
}

/* The two principal lines: CrossFit + HYROX */
.disciplinas__lines {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--s-3);
  margin-bottom: var(--s-7);
}

.linea {
  position: relative;
  overflow: hidden;
  isolation: isolate;
  min-height: 460px;
  display: flex;
  align-items: flex-end;
  border: 1px solid var(--c-line);
  border-radius: var(--radius-lg);
  background: var(--c-surface);
  transition: border-color var(--t-mid) var(--ease);
}
.linea__bg {
  position: absolute;
  inset: 0;
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
  z-index: -2;
  transition: transform var(--t-slow) var(--ease);
  filter: saturate(0.9) brightness(0.62);
}
.linea:hover .linea__bg { transform: scale(1.04); }
.linea::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background: linear-gradient(180deg, rgba(35,31,32,0.15) 0%, rgba(35,31,32,0.82) 70%, rgba(35,31,32,0.96) 100%);
}
.linea__body {
  padding: var(--s-5);
  width: 100%;
}
.linea__mark {
  font-family: var(--f-stencil);
  font-size: var(--t-mark);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--c-accent);
  display: block;
  margin-bottom: var(--s-2);
}
.linea__name {
  font-family: var(--f-display);
  font-style: italic;
  text-transform: uppercase;
  font-size: clamp(2.6rem, 5vw, 4.4rem);
  line-height: 0.9;
  letter-spacing: -0.012em;
  margin: 0 0 var(--s-2);
}
.linea__desc {
  color: var(--c-muted-2);
  font-size: 1rem;
  line-height: 1.55;
  margin: 0 0 var(--s-4);
  max-width: 46ch;
}
/* HYROX line uses yellow accents; CrossFit uses purple (default). */
.linea[data-disc="crossfit"] { border-top: 3px solid var(--c-purple-light); }
.linea[data-disc="hyrox"]    { border-top: 3px solid var(--c-hyrox-yellow); }
.linea[data-disc="hyrox"] .linea__mark { color: var(--c-hyrox-yellow); }
.linea[data-disc="crossfit"]:hover { border-color: var(--c-purple-light); }
.linea[data-disc="hyrox"]:hover    { border-color: var(--c-hyrox-yellow); }

/* Shared core block: Yoga + Fuerza included in every membership */
.incluido {
  border: 1px solid var(--c-line);
  border-radius: var(--radius-lg);
  background: var(--c-purple-deep);
  padding: var(--s-6);
}
.incluido__head { margin-bottom: var(--s-5); }
.incluido__title {
  font-family: var(--f-display);
  font-style: italic;
  text-transform: uppercase;
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  line-height: 0.95;
  letter-spacing: -0.01em;
  margin: var(--s-1) 0 var(--s-2);
}
.incluido__lead {
  color: var(--c-muted-2);
  font-size: 1rem;
  line-height: 1.55;
  max-width: 60ch;
  margin: 0;
}
.incluido__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--s-3);
  margin-bottom: var(--s-4);
}
.incluido-card {
  position: relative;
  overflow: hidden;
  isolation: isolate;
  min-height: 200px;
  display: flex;
  align-items: flex-end;
  border-radius: var(--radius);
  background: var(--c-purple-deep-soft);
}
.incluido-card__bg {
  position: absolute;
  inset: 0;
  background-position: center;
  background-size: cover;
  z-index: -2;
  filter: saturate(0.9) brightness(0.6);
}
.incluido-card::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background: linear-gradient(180deg, transparent 30%, rgba(26,23,48,0.92) 100%);
}
.incluido-card--nophoto { background: var(--c-purple-deep-soft); }
.incluido-card--nophoto::before { display: none; }
.incluido-card__body { padding: var(--s-4); }
.incluido-card__name {
  font-family: var(--f-display);
  font-style: italic;
  text-transform: uppercase;
  font-size: 1.6rem;
  line-height: 1;
  margin: 0 0 var(--s-1);
  color: var(--c-accent);
}
.incluido-card__desc {
  color: var(--c-muted-2);
  font-size: 0.92rem;
  line-height: 1.5;
  margin: 0;
}
.incluido__cross {
  border-top: 1px solid var(--c-line-strong);
  padding-top: var(--s-4);
}
.incluido__cross-title {
  font-family: var(--f-stencil);
  font-size: var(--t-mark);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--c-accent);
  margin: 0 0 var(--s-1);
}
.incluido__cross-text {
  color: var(--c-muted-2);
  font-size: 0.98rem;
  line-height: 1.55;
  max-width: 64ch;
  margin: 0;
}

@media (max-width: 860px) {
  .disciplinas__lines { grid-template-columns: 1fr; }
  .linea { min-height: 360px; }
  .incluido__grid { grid-template-columns: 1fr; }
}

/* HYROX text logo built from SVG — reusable badge (yellow on black). */
.hyrox-mark {
  display: inline-flex;
  align-items: center;
  background: var(--c-hyrox-bg);
  color: var(--c-hyrox-yellow);
  font-family: var(--f-hyrox);
  font-style: normal;
  font-weight: 800;
  font-size: 0.9rem;
  letter-spacing: 0.02em;
  padding: 0.25rem 0.55rem 0.2rem;
  text-transform: uppercase;
  line-height: 1;
}
.hyrox-mark--lg {
  font-size: 1.4rem;
  padding: 0.4rem 0.8rem 0.32rem;
}

/* =========================================================================
   COACHES — equal-sized cards, 5-up grid (responsive collapse)
   ========================================================================= */
.coaches {
  background: var(--c-purple-deep);
}

.coaches .coach { background: var(--c-purple-deep-soft); }

.coaches__grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: var(--s-2);
}

.coach {
  position: relative;
  overflow: hidden;
  background: var(--c-surface-2);
  cursor: pointer;
  isolation: isolate;
  border: 1px solid var(--c-line);
  border-radius: var(--radius-lg);
  transition: border-color var(--t-mid);
}
.coach:hover { border-color: var(--c-accent-line); }

.coach__photo {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
  z-index: -1;
  transition: transform var(--t-slow) var(--ease);
  filter: saturate(0.9);
}
.coach:hover .coach__photo { transform: scale(1.04); }

.coach::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 35%, rgba(17,15,16,0.92) 100%);
  z-index: -1;
}

.coach__info {
  padding: var(--s-3);
  align-self: flex-end;
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}
.coach__role {
  font-family: var(--f-stencil);
  font-size: var(--t-mark);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--c-accent);
  margin: 0;
}
.coach__name {
  font-family: var(--f-display);
  font-style: italic;
  font-size: clamp(1.6rem, 3vw, 2.4rem);
  line-height: 0.95;
  text-transform: uppercase;
  letter-spacing: -0.01em;
  margin: 0;
}
.coach__hint {
  font-size: var(--t-micro);
  color: var(--c-muted);
  margin-top: var(--s-1);
  letter-spacing: 0.05em;
}

.coach {
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  min-height: 360px;
}

.coach__hint {
  display: none;
}

@media (max-width: 1024px) {
  .coaches__grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 640px) {
  .coaches__grid { grid-template-columns: repeat(2, 1fr); }
  .coach { min-height: 280px; }
}

/* =========================================================================
   HORARIOS — clean tables, no eyebrow stripes, mode-aware
   ========================================================================= */
.horarios { background: var(--c-bg); }

.horarios__wrap {
  display: flex;
  flex-direction: column;
  gap: var(--s-5);
}

/* Each .h-schedule groups one weekday + one weekend table together visually. */
.h-schedule {
  display: flex;
  flex-direction: column;
  gap: var(--s-3);
  background: var(--c-surface-2);
  border: 1px solid var(--c-line);
  border-radius: var(--radius-lg);
  padding: var(--s-4);
}

.h-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.92rem;
  table-layout: fixed;
}
/* Force the Hora column to a fixed narrow width so day columns split evenly */
.h-table col.h-col-hora { width: 88px; }
.h-table col.h-col-day  { width: auto; }
.h-table caption {
  text-align: left;
  font-family: var(--f-display);
  font-style: italic;
  font-size: 1.25rem;
  text-transform: uppercase;
  letter-spacing: -0.005em;
  color: var(--c-fg);
  padding-bottom: var(--s-2);
}
.h-table th {
  font-family: var(--f-stencil);
  font-size: var(--t-micro);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--c-muted);
  font-weight: 400;
  padding: var(--s-2) 0.5rem;
  text-align: left;
  border-bottom: 1px solid var(--c-line-strong);
}
.h-table td {
  padding: 0.85rem 0.5rem;
  border-bottom: 1px solid var(--c-line);
  font-weight: 500;
  color: var(--c-fg);
}
.h-table td:first-child {
  font-family: var(--f-stencil);
  font-size: 0.82rem;
  letter-spacing: 0.08em;
  color: var(--c-muted-2);
}

/* Cell color codes — subtle pills, not stripey blocks */
.h-table td.cls-wod,
.h-table td.cls-fuerza,
.h-table td.cls-yoga,
.h-table td.cls-hyroxbrand {
  position: relative;
  padding-left: 1.5rem;
}
.h-table td.cls-wod::before,
.h-table td.cls-fuerza::before,
.h-table td.cls-yoga::before,
.h-table td.cls-hyroxbrand::before {
  content: "";
  position: absolute;
  left: 0.5rem;
  top: 50%;
  transform: translateY(-50%);
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.h-table td.cls-wod::before        { background: var(--c-purple-light); }
.h-table td.cls-fuerza::before     { background: var(--c-coral); }
.h-table td.cls-yoga::before       { background: var(--c-purple); }
.h-table td.cls-hyroxbrand::before { background: var(--c-hyrox-yellow); }
.h-table td.cls-empty { color: var(--c-line-strong); }

.h-legend {
  display: flex;
  flex-wrap: wrap;
  gap: var(--s-3);
  margin-top: var(--s-4);
  padding-top: var(--s-3);
  border-top: 1px solid var(--c-line);
}
.h-legend__item {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: var(--t-small);
  color: var(--c-muted-2);
  letter-spacing: 0.04em;
}
.h-legend__sw {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}
.h-legend__sw.cls-wod        { background: var(--c-purple-light); }
.h-legend__sw.cls-fuerza     { background: var(--c-coral); }
.h-legend__sw.cls-yoga       { background: var(--c-purple); }
.h-legend__sw.cls-hyroxbrand { background: var(--c-hyrox-yellow); }

.h-note {
  font-size: var(--t-small);
  color: var(--c-muted);
  margin-top: var(--s-3);
}

/* =========================================================================
   PLANES — grouped by tier, highlighted recommendation, no hardcoded blocks
   ========================================================================= */
.planes { background: var(--c-purple-deep); }

.planes__group + .planes__group {
  margin-top: var(--s-6);
}
.planes__group-mark {
  font-family: var(--f-stencil);
  font-size: var(--t-mark);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--c-muted);
  margin: 0 0 var(--s-3);
  padding-top: var(--s-3);
  border-top: 1px solid var(--c-line);
}

.planes__grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--s-2);
}
.planes__grid--triple { grid-template-columns: repeat(3, 1fr); }
.planes__grid--single { grid-template-columns: 1fr; max-width: 640px; }

.plan {
  background: var(--c-surface-2);
  border: 1px solid var(--c-line);
  border-radius: var(--radius-lg);
  padding: var(--s-4);
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
  overflow: hidden;
  transition: border-color var(--t-mid), background var(--t-mid);
}
.plan:hover { border-color: var(--c-accent-line); }

/* Unlimited tier — the top plan: both disciplines. Highlighted in purple. */
.plan[data-tier="unlimited"] {
  border-color: var(--c-purple-light);
  background: linear-gradient(180deg, rgba(154,146,208,0.10) 0%, var(--c-surface-2) 60%);
}
.plan[data-tier="unlimited"]::before {
  content: "Acceso total";
  position: absolute;
  top: 0;
  left: 0;
  background: var(--c-purple-light);
  color: var(--c-black);
  font-family: var(--f-stencil);
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  padding: 0.4rem 0.7rem;
  text-transform: uppercase;
  border-top-left-radius: var(--radius-lg);
  border-bottom-right-radius: var(--radius-sm);
}

.plan[data-tier="premium"] {
  border-color: var(--c-accent-line);
  background: linear-gradient(180deg, var(--c-surface-2) 0%, rgba(35,31,32,0.95) 100%);
}
.plan[data-tier="premium"]::before {
  content: "Recomendado";
  position: absolute;
  top: 0;
  left: 0;
  background: var(--c-accent);
  color: var(--c-black);
  font-family: var(--f-stencil);
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  padding: 0.4rem 0.7rem;
  text-transform: uppercase;
  border-top-left-radius: var(--radius-lg);
  border-bottom-right-radius: var(--radius-sm);
}

/* Min-heights using `lh` units ensure tag/name/price-note lines align
   across all cards in a row, regardless of text length wrap differences. */
.plan__tag {
  font-family: var(--f-stencil);
  font-size: var(--t-micro);
  letter-spacing: 0.14em;
  color: var(--c-muted);
  text-transform: uppercase;
  margin: 0;
  min-height: 2lh;
  line-height: 1.4;
}
.plan__name {
  font-family: var(--f-display);
  font-style: italic;
  font-size: 1.6rem;
  line-height: 1;
  text-transform: uppercase;
  letter-spacing: -0.005em;
  margin: var(--s-1) 0 var(--s-2);
  min-height: 1lh;
}
.plan__price {
  font-family: var(--f-display);
  font-size: 2.4rem;
  font-style: italic;
  line-height: 1;
  color: var(--c-fg);
  margin: 0;
  letter-spacing: -0.01em;
}
.plan__price-note {
  font-size: var(--t-small);
  color: var(--c-muted);
  margin: var(--s-1) 0 0;
  min-height: 2lh;
  line-height: 1.4;
}
.plan__features {
  list-style: none;
  margin: var(--s-2) 0 var(--s-3);
  padding: 0;
  flex: 1;
}
.plan__features li {
  position: relative;
  padding-left: 1.1rem;
  font-size: 0.92rem;
  color: var(--c-muted-2);
  line-height: 1.55;
  padding-block: 0.25rem;
}
.plan__features li::before {
  content: "/";
  position: absolute;
  left: 0;
  color: var(--c-accent);
  font-family: var(--f-stencil);
}
.plan__cta {
  width: 100%;
  margin-top: auto;
}

.planes__footnote {
  text-align: center;
  color: var(--c-muted);
  font-size: var(--t-small);
  font-style: italic;
  margin-top: var(--s-5);
}

.linea__cta { margin-top: var(--s-1); }

@media (max-width: 1024px) {
  .planes__grid,
  .planes__grid--triple { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 560px) {
  .planes__grid,
  .planes__grid--triple { grid-template-columns: 1fr; }
}

/* =========================================================================
   SERVICIOS EXTRA
   ========================================================================= */
.servicios { background: var(--c-bg); }

.servicios__grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border-top: 1px solid var(--c-line);
}
.servicio {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: var(--s-3);
  align-items: center;
  padding: var(--s-3) 0;
  border-bottom: 1px solid var(--c-line);
}
.servicio:nth-child(odd) {
  padding-right: var(--s-3);
  border-right: 1px solid var(--c-line);
}
.servicio:nth-child(even) {
  padding-left: var(--s-3);
}
.servicio__num {
  font-family: var(--f-stencil);
  font-size: var(--t-mark);
  color: var(--c-accent);
  letter-spacing: 0.14em;
}
.servicio__body { display: flex; flex-direction: column; gap: 0.25rem; }
.servicio__name {
  font-family: var(--f-display);
  font-style: italic;
  font-size: 1.2rem;
  text-transform: uppercase;
  letter-spacing: -0.005em;
  margin: 0;
}
.servicio__note {
  font-size: 0.88rem;
  color: var(--c-muted-2);
  margin: 0;
  line-height: 1.5;
}
.servicio__price {
  font-family: var(--f-display);
  font-style: italic;
  font-size: 1.5rem;
  color: var(--c-accent);
  letter-spacing: -0.01em;
}

@media (max-width: 768px) {
  .servicios__grid { grid-template-columns: 1fr; }
  .servicio:nth-child(odd) { border-right: 0; padding-right: 0; }
  .servicio:nth-child(even) { padding-left: 0; }
}

/* =========================================================================
   TESTIMONIOS — stacked column with big quotation accents (purple)
   ========================================================================= */
.testimonios { background: var(--c-purple-deep); }

.testimonios__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--s-4);
}

.t-card {
  background: var(--c-surface-2);
  padding: var(--s-4);
  border-left: 2px solid var(--c-accent);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  gap: var(--s-3);
  position: relative;
  overflow: hidden;
}
.t-card::before {
  content: """;
  position: absolute;
  top: var(--s-1);
  right: var(--s-3);
  font-family: var(--f-display);
  font-size: 4rem;
  line-height: 1;
  color: var(--c-accent);
  opacity: 0.35;
}

.t-card__quote {
  font-size: 1.05rem;
  line-height: 1.55;
  color: var(--c-fg);
  margin: 0;
  font-weight: 300;
}

.t-card__author {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  margin-top: auto;
  padding-top: var(--s-2);
  border-top: 1px solid var(--c-line);
}
.t-card__avatar {
  width: 38px;
  height: 38px;
  background: var(--c-purple);
  color: var(--c-black);
  display: grid;
  place-items: center;
  font-family: var(--f-display);
  font-style: italic;
  font-weight: 700;
  border-radius: 50%;
  text-transform: uppercase;
}
.t-card__name { font-weight: 600; font-size: 0.95rem; margin: 0; }
.t-card__detail { font-size: var(--t-micro); color: var(--c-muted); margin: 0; }

@media (max-width: 1024px) { .testimonios__grid { grid-template-columns: 1fr; } }

/* =========================================================================
   INSTAGRAM strip — coral accent
   ========================================================================= */
.ig { background: var(--c-bg); }

.ig__grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
}

.ig__item {
  aspect-ratio: 1 / 1;
  background-color: var(--c-surface);
  background-size: cover;
  background-position: center;
  position: relative;
  overflow: hidden;
  isolation: isolate;
  border-radius: var(--radius);
  transition: transform var(--t-mid) var(--ease);
}
.ig__item:hover { transform: scale(1.02); }
.ig__item::after {
  content: "";
  position: absolute;
  inset: 0;
  background: var(--c-coral);
  opacity: 0;
  mix-blend-mode: multiply;
  transition: opacity var(--t-mid);
}
.ig__item:hover::after { opacity: 0.25; }

@media (max-width: 1024px) { .ig__grid { grid-template-columns: repeat(3, 1fr); } }

/* =========================================================================
   CTA FINAL — single big editorial moment
   ========================================================================= */
.cta-final {
  background: var(--c-purple-deep);
  text-align: center;
  padding-block: var(--s-9) var(--s-8);
  border-top: 1px solid var(--c-line);
}
.cta-final__mark {
  font-family: var(--f-stencil);
  font-size: var(--t-mark);
  letter-spacing: 0.18em;
  color: var(--c-accent);
  text-transform: uppercase;
  margin: 0 0 var(--s-3);
}
.cta-final__title {
  font-family: var(--f-display);
  font-style: italic;
  font-size: var(--t-mega);
  line-height: 0.84;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  margin: 0 0 var(--s-4);
}
.cta-final__title em { color: var(--c-accent); font-style: italic; }
.cta-final__sub {
  color: var(--c-muted-2);
  font-size: var(--t-lead);
  font-weight: 300;
  margin: 0 auto var(--s-5);
  max-width: 42ch;
}
.cta-final__ctas {
  display: flex;
  gap: var(--s-2);
  justify-content: center;
  flex-wrap: wrap;
}

/* =========================================================================
   FOOTER
   ========================================================================= */
.footer {
  background: var(--c-surface-2);
  padding: var(--s-6) 0 var(--s-3);
  border-top: 1px solid var(--c-line);
}
.footer__grid {
  display: grid;
  grid-template-columns: 1.4fr repeat(3, 1fr);
  gap: var(--s-5);
  padding-bottom: var(--s-5);
  border-bottom: 1px solid var(--c-line);
}
.footer__logo-img {
  height: 56px;
  width: auto;
  margin-bottom: var(--s-3);
}
.footer__about {
  font-size: 0.92rem;
  color: var(--c-muted-2);
  line-height: 1.55;
  max-width: 36ch;
  margin: 0;
}
.footer__title {
  font-family: var(--f-stencil);
  font-size: var(--t-mark);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--c-accent);
  margin: 0 0 var(--s-2);
  font-weight: 400;
}
.footer__list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  font-size: 0.92rem;
  color: var(--c-muted-2);
}
.footer__list a:hover { color: var(--c-accent); }
.footer__bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: var(--s-3);
  font-size: var(--t-micro);
  color: var(--c-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-family: var(--f-stencil);
}

@media (max-width: 1024px) {
  .footer__grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
  .footer__grid { grid-template-columns: 1fr; }
  .footer__bottom { flex-direction: column; gap: var(--s-2); text-align: center; }
}

/* =========================================================================
   WHATSAPP FLOAT
   ========================================================================= */
.wa-float {
  position: fixed;
  bottom: var(--s-3);
  right: var(--s-3);
  width: 56px;
  height: 56px;
  background: var(--c-wa);
  color: var(--c-white);
  display: grid;
  place-items: center;
  border-radius: 50%;
  z-index: 90;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  transition: transform var(--t-mid) var(--ease);
}
.wa-float:hover { transform: scale(1.08); }
.wa-float svg { width: 28px; height: 28px; }

/* =========================================================================
   COACH MODAL
   ========================================================================= */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: var(--s-3);
  overflow-y: auto;
}
.modal.is-open { display: flex; }
.modal__inner {
  background: var(--c-surface);
  max-width: 700px;
  width: 100%;
  position: relative;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  border: 1px solid var(--c-line-strong);
  border-radius: var(--radius-lg);
  max-height: 90vh;
  overflow: hidden;
}
.modal__close {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 36px;
  height: 36px;
  display: grid;
  place-items: center;
  font-size: 1.5rem;
  color: var(--c-fg);
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  z-index: 2;
}
.modal__photo {
  background-size: cover;
  background-position: center top;
  background-color: var(--c-surface-2);
  min-height: 320px;
}
.modal__body { padding: var(--s-4); overflow-y: auto; }
.modal__name {
  font-family: var(--f-display);
  font-style: italic;
  font-size: 2rem;
  line-height: 1;
  text-transform: uppercase;
  margin: 0 0 0.25rem;
  letter-spacing: -0.01em;
}
.modal__role {
  font-family: var(--f-stencil);
  font-size: var(--t-mark);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--c-accent);
  margin: 0 0 var(--s-3);
}
.modal__bullets {
  margin: 0 0 var(--s-3);
}
.modal__bullets li {
  position: relative;
  padding-left: 1.1rem;
  font-size: 0.95rem;
  color: var(--c-muted-2);
  padding-block: 0.3rem;
  line-height: 1.5;
}
.modal__bullets li::before {
  content: "/";
  position: absolute;
  left: 0;
  color: var(--c-accent);
  font-family: var(--f-stencil);
}
.modal__ig {
  display: inline-flex;
  align-items: center;
  gap: 0.4em;
  color: var(--c-accent);
  font-weight: 500;
  font-size: 0.95rem;
}

@media (max-width: 600px) {
  .modal__inner { grid-template-columns: 1fr; }
  .modal__photo { min-height: 220px; }
}

/* =========================================================================
   ILLUSTRATION SLOTS — placeholders for brand-manual illustrations
   These render as neutral geometric SVG until real assets are dropped in.
   When ready, swap the inline SVG inside the slot.
   ========================================================================= */
.illustration-slot {
  display: grid;

  background: var(--c-accent-soft);
  border: 1px dashed var(--c-accent-line);
  aspect-ratio: 1 / 1;
  color: var(--c-accent);
  position: relative;
  overflow: hidden;
}
.illustration-slot svg { width: 60%; height: 60%; opacity: 0.85; }
.illustration-slot__label {
  position: absolute;
  bottom: 0.5rem;
  left: 0.5rem;
  font-family: var(--f-stencil);
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  color: var(--c-accent);

}

function renderHorarios() {
  const wrap = $('#horarios-wrap');
  const legendBox = $('#h-legend');

  // Build a single table from a {title, headers, rows} block.
  // Uses an explicit <colgroup> so the first ('Hora') column is narrow and
  // the day columns split the rest equally regardless of header text length.
  function buildTable(caption, headers, rows) {
    const labelOf = ({wod:'WOD', fuerza:'Fuerza', yoga:'Yoga', hyrox:'HYROX', hyroxbrand:'HYROX'});
    const colsHTML = headers.map((_, i) =>
      `<col class="${i === 0 ? 'h-col-hora' : 'h-col-day'}">`
    ).join('');
    const headerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
    const rowsHTML = rows.map(row => {
      const cells = row.map((cell, i) => {
        if (i === 0) return `<td>${cell}</td>`;
        if (!cell) return '<td class="cls-empty">—</td>';
        return `<td class="cls-${cell}">${labelOf[cell] || cell}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table class="h-table">
      <caption>${caption}</caption>
      <colgroup>${colsHTML}</colgroup>
      <thead>${headerHTML}</thead>
      <tbody>${rowsHTML}</tbody>
    </table>`;
  }

  // Build BOTH weekday and weekend tables for a schedule and wrap them.
  function tableHTML(schedule) {
    let html = buildTable(schedule.title, schedule.headers, schedule.rows);
    if (schedule.weekend && schedule.weekend.length) {
      html += buildTable(schedule.sectionTitle, schedule.weekendHeaders, schedule.weekend);
    }
    return `<div class="h-schedule">${html}</div>`;
  }

  // Show ZonaG + HYROX schedules side by side, single legend covering both.
  wrap.innerHTML = tableHTML(CONFIG.horarios.zonag) + tableHTML(CONFIG.horarios.hyrox);
  legendBox.innerHTML = [...CONFIG.legend.zonag, ...CONFIG.legend.hyrox]
    .map(l => `<span class="h-legend__item"><span class="h-legend__sw ${l.cls}"></span>${l.label}</span>`).join('');
}

/* =========================================================================
   COACH MODAL
   ========================================================================= */
function openCoach(id) {
  const coach = CONFIG.coaches.items.find(c => c.id === id);
  if (!coach) return;

  const ph = resolvePhoto(coach.photo);
  if (ph) {
    $('#modal-photo').style.backgroundImage = `url('${ph}')`;
    $('#modal-photo').style.background = '';
  } else {
    $('#modal-photo').style.backgroundImage = '';
    placeholderBg($('#modal-photo'));
  }
  $('#modal-name').textContent = coach.name;
  $('#modal-role').textContent = coach.role;
  $('#modal-bullets').innerHTML = coach.bullets.map(b => `<li>${b}</li>`).join('');

  const ig = $('#modal-ig');
  if (coach.ig && coach.ig !== 'PENDIENTE') {
    ig.href = `https://instagram.com/${coach.ig.replace('@','')}`;
    ig.textContent = `@${coach.ig.replace('@','')} →`;
    ig.style.display = '';
  } else {
    ig.style.display = 'none';
  }

  const modal = $('#coach-modal');
  modal.classList.add('is-open');
  modal.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closeCoach() {
  const modal = $('#coach-modal');
  modal.classList.remove('is-open');
  modal.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

/* =========================================================================
/* =========================================================================
   REVEAL ON SCROLL
   ========================================================================= */
let observer;
function observeReveals() {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('is-visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  $$('.reveal').forEach(el => observer.observe(el));
}

/* =========================================================================
   WHATSAPP LINKS
   Re-bound after every CTA renders so dynamically-added anchors work.
   ========================================================================= */
function bindWhatsAppLinks() {
  $$('[data-cta]').forEach(el => {
    el.href = waLink(el.dataset.cta);
    el.target = '_blank';
    el.rel = 'noopener';
  });
}

/* =========================================================================
   MOBILE MENU
   ========================================================================= */
function bindMobileMenu() {
  const burger = $('.nav__burger');
  const center = $('.nav__center');
  burger.addEventListener('click', () => {
    const open = document.body.classList.toggle('menu-open');
    center.classList.toggle('is-mobile-open', open);
    burger.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  // Delegate close-on-link-click since nav links are rendered dynamically.
  document.addEventListener('click', (e) => {
    if (e.target.closest('.nav__links a')) {
      document.body.classList.remove('menu-open');
      center.classList.remove('is-mobile-open');
      burger.setAttribute('aria-expanded', 'false');
    }
  });
}

/* =========================================================================
   BIND MODAL
   ========================================================================= */
function bindModal() {
  const modal = $('#coach-modal');
  $('.modal__close').addEventListener('click', closeCoach);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeCoach(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCoach(); });
}

/* =========================================================================
   INIT
   ========================================================================= */
document.addEventListener('DOMContentLoaded', () => {
  renderNav();
  renderHero();
  renderManifiesto();
  renderDisciplinas();
  renderCoaches();
  renderHorariosHeader();
  renderHorarios();
  renderPlanesHeader();
  renderPlanes();
  renderServicios();
  renderTestimonios();
  renderIG();
  renderCtaFinal();
  renderFooter();

  bindMobileMenu();
  bindModal();
  bindWhatsAppLinks();
  observeReveals();
});
